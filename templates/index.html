<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嘉兴藏大藏经阅读器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a84c;
            --gold-light: #e8d08a;
            --gold-dark: #8b6914;
            --red-deep: #6b0f0f;
            --red: #8b1a1a;
            --ink: #1a0f00;
            --paper: #faf6ee;
            --paper-dark: #f0e8d8;
            --paper-mid: #f5edd8;
            --shadow: rgba(0,0,0,0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'KaiTi', 'STKaiti', '楷体', 'Noto Serif SC', serif;
            background: var(--ink);
            color: var(--ink);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== BACKGROUND ===== */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(139,26,26,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.06) 0%, transparent 50%),
                linear-gradient(160deg, #1a0f00 0%, #0d0800 100%);
            z-index: -2;
        }

        /* Subtle texture overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a84c' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            z-index: -1;
            opacity: 0.5;
        }

        /* ===== HEADER ===== */
        .header {
            position: relative;
            padding: 0;
            background: linear-gradient(180deg, #0d0800 0%, rgba(13,8,0,0.95) 100%);
            border-bottom: 1px solid rgba(201,168,76,0.3);
            overflow: hidden;
        }

        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 30px;
            position: relative;
            z-index: 1;
        }

        /* Decorative line */
        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), var(--gold-light), var(--gold), transparent);
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-emblem {
            width: 48px;
            height: 48px;
            border: 2px solid var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: var(--gold);
            background: rgba(201,168,76,0.08);
            box-shadow: 0 0 15px rgba(201,168,76,0.2), inset 0 0 10px rgba(201,168,76,0.05);
            flex-shrink: 0;
        }

        .header-title h1 {
            font-size: 22px;
            font-weight: 500;
            color: var(--gold-light);
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(201,168,76,0.4);
        }

        .header-title .subtitle {
            font-size: 12px;
            color: rgba(201,168,76,0.5);
            letter-spacing: 2px;
            margin-top: 3px;
        }

        .header-badge {
            font-size: 11px;
            color: rgba(201,168,76,0.4);
            letter-spacing: 1px;
            border: 1px solid rgba(201,168,76,0.2);
            padding: 4px 10px;
            border-radius: 20px;
        }

        /* ===== NAV BAR ===== */
        .nav-bar {
            background: rgba(13,8,0,0.9);
            border-bottom: 1px solid rgba(201,168,76,0.15);
            padding: 12px 30px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            backdrop-filter: blur(10px);
        }

        .nav-label {
            font-size: 13px;
            color: rgba(201,168,76,0.6);
            letter-spacing: 1px;
        }

        .nav-select {
            padding: 7px 12px;
            border: 1px solid rgba(201,168,76,0.25);
            border-radius: 6px;
            background: rgba(201,168,76,0.05);
            font-size: 14px;
            color: var(--gold-light);
            font-family: inherit;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
        }
        .nav-select:hover, .nav-select:focus {
            border-color: rgba(201,168,76,0.5);
            background: rgba(201,168,76,0.1);
        }
        .nav-select option {
            background: #1a0f00;
            color: var(--gold-light);
        }

        .btn {
            padding: 7px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.25s;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--red), var(--red-deep));
            color: var(--gold-light);
            border: 1px solid rgba(201,168,76,0.3);
            box-shadow: 0 2px 8px rgba(107,15,15,0.4);
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #a02020, var(--red));
            box-shadow: 0 4px 15px rgba(139,26,26,0.5);
            transform: translateY(-1px);
        }

        .btn-nav {
            background: rgba(201,168,76,0.08);
            color: var(--gold);
            border: 1px solid rgba(201,168,76,0.2);
        }
        .btn-nav:hover:not(:disabled) {
            background: rgba(201,168,76,0.15);
            border-color: rgba(201,168,76,0.4);
        }
        .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

        .btn-stop {
            background: rgba(139,26,26,0.3);
            color: #ff8888;
            border: 1px solid rgba(139,26,26,0.4);
        }

        .page-nav {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }
        .page-nav span {
            font-size: 13px;
            color: rgba(201,168,76,0.5);
        }
        .page-input {
            width: 55px;
            text-align: center;
            padding: 6px 8px;
            border: 1px solid rgba(201,168,76,0.25);
            border-radius: 6px;
            background: rgba(201,168,76,0.05);
            color: var(--gold-light);
            font-size: 14px;
            font-family: inherit;
            outline: none;
        }
        .page-input:focus { border-color: rgba(201,168,76,0.5); }

        /* ===== LOADING ===== */
        .loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(13,8,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            backdrop-filter: blur(4px);
        }
        .loading-overlay.active { display: flex; }

        .loading-ring {
            width: 60px;
            height: 60px;
            position: relative;
            margin-bottom: 20px;
        }
        .loading-ring::before, .loading-ring::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 2px solid transparent;
        }
        .loading-ring::before {
            border-top-color: var(--gold);
            animation: spin 1s linear infinite;
        }
        .loading-ring::after {
            border-bottom-color: rgba(201,168,76,0.3);
            animation: spin 1.5s linear infinite reverse;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-icon {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .loading-text {
            font-size: 15px;
            color: var(--gold-light);
            letter-spacing: 2px;
            text-align: center;
        }
        .loading-sub {
            font-size: 12px;
            color: rgba(201,168,76,0.4);
            margin-top: 8px;
            letter-spacing: 1px;
        }

        /* ===== MAIN LAYOUT ===== */
        .main-content {
            display: flex;
            min-height: calc(100vh - 115px);
        }

        /* ===== SCRIPTURE PANEL ===== */
        .scripture-panel {
            flex: 1;
            padding: 25px 30px;
            min-width: 0;
        }

        /* Book info bar */
        .book-info-bar {
            display: none;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 14px 20px;
            background: rgba(201,168,76,0.05);
            border: 1px solid rgba(201,168,76,0.15);
            border-radius: 10px;
        }

        .book-title-area h2 {
            font-size: 18px;
            font-weight: 500;
            color: var(--gold-light);
            letter-spacing: 3px;
        }
        .book-meta {
            font-size: 12px;
            color: rgba(201,168,76,0.4);
            margin-top: 4px;
            letter-spacing: 1px;
        }

        .page-badge {
            text-align: right;
        }
        .page-badge .num {
            font-size: 32px;
            font-weight: 300;
            color: var(--gold);
            line-height: 1;
        }
        .page-badge .label {
            font-size: 11px;
            color: rgba(201,168,76,0.4);
            letter-spacing: 1px;
        }

        /* TTS Controls */
        .tts-bar {
            display: none;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
            padding: 10px 16px;
            background: rgba(201,168,76,0.04);
            border: 1px solid rgba(201,168,76,0.1);
            border-radius: 8px;
            flex-wrap: wrap;
        }
        .tts-label {
            font-size: 12px;
            color: rgba(201,168,76,0.5);
            letter-spacing: 1px;
        }
        .tts-select {
            padding: 5px 10px;
            border: 1px solid rgba(201,168,76,0.2);
            border-radius: 5px;
            background: rgba(201,168,76,0.05);
            color: var(--gold-light);
            font-size: 12px;
            font-family: inherit;
            max-width: 160px;
            outline: none;
        }
        .tts-select option { background: #1a0f00; }
        .tts-range {
            -webkit-appearance: none;
            width: 70px;
            height: 3px;
            background: rgba(201,168,76,0.2);
            border-radius: 2px;
            outline: none;
        }
        .tts-range::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--gold);
            cursor: pointer;
        }
        .rate-display {
            font-size: 12px;
            color: rgba(201,168,76,0.5);
            min-width: 30px;
        }

        /* ===== SCRIPTURE TEXT ===== */
        .scripture-container {
            background: linear-gradient(160deg, rgba(250,246,238,0.97) 0%, rgba(240,232,216,0.97) 100%);
            border-radius: 12px;
            border: 1px solid rgba(201,168,76,0.3);
            box-shadow: 
                0 4px 30px rgba(0,0,0,0.4),
                0 0 0 1px rgba(201,168,76,0.1),
                inset 0 1px 0 rgba(255,255,255,0.5);
            overflow: hidden;
            position: relative;
        }

        /* Paper texture lines */
        .scripture-container::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 38px,
                rgba(201,168,76,0.08) 38px,
                rgba(201,168,76,0.08) 39px
            );
            pointer-events: none;
        }

        /* Left red margin line */
        .scripture-container::after {
            content: '';
            position: absolute;
            top: 0; bottom: 0;
            left: 60px;
            width: 1px;
            background: rgba(139,26,26,0.15);
            pointer-events: none;
        }

        .scripture-text {
            padding: 30px 35px 30px 75px;
            font-size: 19px;
            line-height: 2.4;
            color: #1a0a00;
            font-family: 'KaiTi', 'STKaiti', '楷体', 'Noto Serif SC', serif;
            font-weight: 400;
            position: relative;
        }

        .page-header-text {
            font-size: 13px;
            color: rgba(139,26,26,0.6);
            letter-spacing: 2px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(201,168,76,0.2);
        }

        .cache-badge {
            display: inline-block;
            font-size: 11px;
            color: rgba(139,26,26,0.5);
            background: rgba(139,26,26,0.06);
            border: 1px solid rgba(139,26,26,0.15);
            border-radius: 10px;
            padding: 2px 8px;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        /* Sentences */
        .sentence {
            display: inline;
            cursor: pointer;
            border-radius: 3px;
            padding: 1px 0;
            transition: all 0.2s;
            position: relative;
        }
        .sentence:hover {
            background: rgba(201,168,76,0.15);
            text-shadow: 0 0 8px rgba(201,168,76,0.3);
        }
        .sentence.active {
            background: rgba(201,168,76,0.25);
            border-bottom: 2px solid var(--gold);
        }
        .sentence.playing {
            background: rgba(139,26,26,0.12);
            border-bottom: 2px solid var(--red);
            animation: pulse-text 1.5s ease-in-out infinite;
        }
        @keyframes pulse-text {
            0%, 100% { background: rgba(139,26,26,0.12); }
            50% { background: rgba(139,26,26,0.22); }
        }

        .hint-text {
            font-size: 12px;
            color: rgba(139,26,26,0.4);
            text-align: right;
            margin-top: 15px;
            padding: 10px 35px;
            letter-spacing: 1px;
            border-top: 1px solid rgba(201,168,76,0.1);
        }

        /* Image page */
        .image-page {
            text-align: center;
            padding: 40px;
            color: rgba(201,168,76,0.5);
        }
        .image-page p { font-size: 15px; margin-bottom: 15px; letter-spacing: 2px; }
        .image-page img {
            max-width: 100%;
            max-height: 500px;
            border: 1px solid rgba(201,168,76,0.2);
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        /* Welcome */
        .welcome {
            text-align: center;
            padding: 60px 30px;
        }
        .welcome-emblem {
            font-size: 60px;
            margin-bottom: 20px;
            color: var(--gold);
            text-shadow: 0 0 30px rgba(201,168,76,0.5);
        }
        .welcome h2 {
            font-size: 26px;
            font-weight: 500;
            color: #5c2a00;
            letter-spacing: 5px;
            margin-bottom: 10px;
        }
        .welcome p {
            font-size: 15px;
            color: #7a4a20;
            letter-spacing: 2px;
            line-height: 2.2;
        }
        .welcome-divider {
            width: 120px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold-dark), transparent);
            margin: 20px auto;
        }
        .welcome-steps {
            display: inline-block;
            text-align: left;
            margin-top: 20px;
            background: rgba(139,26,26,0.06);
            border: 1px solid rgba(139,26,26,0.15);
            border-radius: 10px;
            padding: 20px 30px;
        }
        .welcome-steps li {
            font-size: 15px;
            color: #5c2a00;
            letter-spacing: 1px;
            line-height: 2.5;
            list-style: none;
            padding-left: 5px;
        }
        .welcome-steps li::before {
            content: '◆ ';
            color: var(--red);
            font-size: 10px;
        }

        /* Error */
        .error-box {
            background: rgba(139,26,26,0.1);
            border: 1px solid rgba(139,26,26,0.3);
            border-radius: 8px;
            padding: 15px 20px;
            color: #ff8888;
            font-size: 14px;
            letter-spacing: 1px;
        }

        /* ===== EXPLANATION PANEL ===== */
        .explanation-panel {
            width: 360px;
            min-width: 360px;
            background: rgba(13,8,0,0.6);
            border-left: 1px solid rgba(201,168,76,0.15);
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            height: calc(100vh - 115px);
            overflow: hidden;
        }

        .panel-header {
            padding: 18px 20px;
            border-bottom: 1px solid rgba(201,168,76,0.15);
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(201,168,76,0.03);
        }
        .panel-header-icon {
            width: 32px;
            height: 32px;
            border: 1px solid rgba(201,168,76,0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: var(--gold);
        }
        .panel-header h3 {
            font-size: 14px;
            font-weight: 400;
            color: var(--gold);
            letter-spacing: 2px;
        }

        .panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scrollbar-width: thin;
            scrollbar-color: rgba(201,168,76,0.2) transparent;
        }
        .panel-body::-webkit-scrollbar { width: 4px; }
        .panel-body::-webkit-scrollbar-track { background: transparent; }
        .panel-body::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.2); border-radius: 2px; }

        .panel-placeholder {
            text-align: center;
            padding: 50px 20px;
            color: rgba(201,168,76,0.25);
            font-size: 13px;
            letter-spacing: 2px;
            line-height: 2.5;
        }
        .panel-placeholder .icon { font-size: 36px; margin-bottom: 15px; opacity: 0.4; }

        .selected-quote {
            background: rgba(201,168,76,0.08);
            border-left: 3px solid var(--gold-dark);
            padding: 12px 15px;
            margin-bottom: 18px;
            border-radius: 0 6px 6px 0;
            font-size: 16px;
            color: var(--gold-light);
            line-height: 1.9;
            letter-spacing: 1px;
        }

        .explanation-body {
            font-size: 14px;
            line-height: 2;
            color: rgba(250,246,238,0.75);
            letter-spacing: 0.5px;
        }
        .explanation-body p { margin-bottom: 12px; }
        .explanation-body strong {
            color: var(--gold-light);
            font-weight: 500;
        }
        .explanation-body h3, .explanation-body h4 {
            color: var(--gold);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 2px;
            margin: 15px 0 8px;
            padding-bottom: 5px;
            border-bottom: 1px solid rgba(201,168,76,0.15);
        }

        .ai-loading {
            text-align: center;
            padding: 30px;
            color: rgba(201,168,76,0.4);
            font-size: 13px;
            letter-spacing: 2px;
        }
        .ai-loading .dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '·'; }
            60% { content: '··'; }
            80%, 100% { content: '···'; }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 900px) {
            .main-content { flex-direction: column; }
            .explanation-panel {
                width: 100%;
                min-width: unset;
                height: 400px;
                border-left: none;
                border-top: 1px solid rgba(201,168,76,0.15);
            }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <div class="header-inner">
        <div class="header-logo">
            <div class="header-emblem">☸</div>
            <div class="header-title">
                <h1>嘉兴藏大藏经</h1>
                <div class="subtitle">数字化经典 · 智能标点 · 语音朗读 · AI解义</div>
            </div>
        </div>
        <div class="header-badge">豆包 AI 驱动</div>
    </div>
</div>

<!-- NAV BAR -->
<div class="nav-bar">
    <span class="nav-label">经书</span>
    <select class="nav-select" id="bookSelect" onchange="loadBook()">
        <option value="20000">嘉兴藏大藏经</option>
    </select>

    <span class="nav-label">函</span>
    <select class="nav-select" id="letterSelect" onchange="onLetterChange()">
        <option value="">— 请选择 —</option>
    </select>

    <button class="btn btn-primary" onclick="loadPage()">载入经文</button>

    <div class="page-nav">
        <button class="btn btn-nav" onclick="prevPage()" id="prevBtn" disabled>◀</button>
        <span>第</span>
        <input type="number" class="page-input" id="pageInput" value="1" min="1" onchange="jumpToPage()">
        <span>页 / <span id="totalPages" style="color:var(--gold);">—</span></span>
        <button class="btn btn-nav" onclick="nextPage()" id="nextBtn" disabled>▶</button>
    </div>
</div>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-ring">
        <div class="loading-icon">☸</div>
    </div>
    <div class="loading-text" id="loadingText">正在载入经文</div>
    <div class="loading-sub" id="loadingSub">请稍候...</div>
</div>

<!-- MAIN -->
<div class="main-content">

    <!-- Scripture Panel -->
    <div class="scripture-panel">

        <!-- Book Info -->
        <div class="book-info-bar" id="bookInfoBar">
            <div class="book-title-area">
                <h2 id="bookTitle">—</h2>
                <div class="book-meta" id="bookMeta">—</div>
            </div>
            <div class="page-badge">
                <div class="num" id="currentPageDisplay">—</div>
                <div class="label">当前页</div>
            </div>
        </div>

        <!-- TTS Bar -->
        <div class="tts-bar" id="ttsBar">
            <span class="tts-label">🔊 语音</span>
            <select class="tts-select" id="voiceSelect"></select>
            <span class="tts-label">语速</span>
            <input type="range" class="tts-range" id="rateRange" min="0.5" max="2" step="0.1" value="0.85">
            <span class="rate-display" id="rateDisplay">0.85×</span>
            <button class="btn btn-stop" onclick="stopSpeech()" id="stopBtn" style="display:none;font-size:12px;padding:5px 12px;">⏹ 停止</button>
        </div>

        <!-- Content -->
        <div id="scriptureContent">
            <div class="scripture-container">
                <div class="scripture-text">
                    <div class="welcome">
                        <div class="welcome-emblem">☸</div>
                        <h2>嘉兴藏大藏经</h2>
                        <div class="welcome-divider"></div>
                        <p>欢迎使用智能经书阅读器</p>
                        <p>将古代经书转换为现代阅读模式</p>
                        <ul class="welcome-steps">
                            <li>选择「函」（章节），点击「载入经文」</li>
                            <li>系统自动 OCR 识别并添加标点符号</li>
                            <li>单击任意句子进行语音朗读</li>
                            <li>双击句子获取 AI 智能解义</li>
                            <li>已处理页面自动缓存，下次秒开</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Explanation Panel -->
    <div class="explanation-panel">
        <div class="panel-header">
            <div class="panel-header-icon">📖</div>
            <h3>经文解义</h3>
        </div>
        <div class="panel-body" id="explanationArea">
            <div class="panel-placeholder">
                <div class="icon">☸</div>
                <div>单击句子 · 语音朗读</div>
                <div>双击句子 · 获取解义</div>
            </div>
        </div>
    </div>

</div>

<script>
// ============ State ============
let currentBookId = 20000;
let currentLetterId = 1;
let currentPageNum = 1;
let totalPages = 1;
let currentSentence = null;
let speechSynth = window.speechSynthesis;
let voices = [];

// ============ Init ============
window.onload = function() {
    loadVoices();
    loadBook();
    document.getElementById('rateRange').addEventListener('input', function() {
        document.getElementById('rateDisplay').textContent = parseFloat(this.value).toFixed(2) + '×';
    });
    if (speechSynth.onvoiceschanged !== undefined) {
        speechSynth.onvoiceschanged = loadVoices;
    }
};

function loadVoices() {
    voices = speechSynth.getVoices();
    const select = document.getElementById('voiceSelect');
    select.innerHTML = '';
    const zhVoices = voices.filter(v => v.lang.includes('zh') || v.lang.includes('cmn'));
    const list = zhVoices.length > 0 ? zhVoices : voices;
    list.forEach(voice => {
        const opt = document.createElement('option');
        opt.value = voices.indexOf(voice);
        opt.textContent = voice.name;
        select.appendChild(opt);
    });
}

// ============ Book Loading ============
async function loadBook() {
    currentBookId = parseInt(document.getElementById('bookSelect').value);
    showLoading('正在获取经书信息', '');
    try {
        const resp = await fetch(`/api/letters?book_id=${currentBookId}`);
        const data = await resp.json();
        if (data.success) {
            const book = data.book;
            document.getElementById('bookTitle').textContent = book.book_name;
            document.getElementById('bookMeta').textContent = `共 ${book.book_letter} 函 · ${book.book_page} 页`;
            document.getElementById('bookInfoBar').style.display = 'flex';
            const sel = document.getElementById('letterSelect');
            sel.innerHTML = '<option value="">— 请选择函 —</option>';
            data.letters.forEach(l => {
                const opt = document.createElement('option');
                opt.value = l.id;
                opt.textContent = l.name;
                sel.appendChild(opt);
            });
        }
    } catch(e) {
        showError('加载经书信息失败：' + e.message);
    } finally {
        hideLoading();
    }
}

function onLetterChange() {
    const val = document.getElementById('letterSelect').value;
    if (val) {
        currentLetterId = parseInt(val);
        currentPageNum = 1;
        document.getElementById('pageInput').value = 1;
    }
}

// ============ Page Loading ============
async function loadPage() {
    const letterVal = document.getElementById('letterSelect').value;
    if (!letterVal) { alert('请先选择函（章节）'); return; }
    currentLetterId = parseInt(letterVal);
    currentPageNum = parseInt(document.getElementById('pageInput').value) || 1;
    await fetchAndDisplayPage();
}

async function fetchAndDisplayPage() {
    showLoading('正在载入经文', '首次加载需 AI 识别，约需 30-60 秒');
    stopSpeech();
    try {
        const url = `/api/page?book_id=${currentBookId}&letter_id=${currentLetterId}&page_num=${currentPageNum}`;
        const resp = await fetch(url);
        const data = await resp.json();
        if (data.success) {
            displayPage(data.data, data.cached);
        } else {
            showError('加载失败：' + data.error);
        }
    } catch(e) {
        showError('网络错误：' + e.message);
    } finally {
        hideLoading();
    }
}

function displayPage(pageData, cached) {
    totalPages = pageData.total_pages;
    currentPageNum = pageData.page_num;
    document.getElementById('currentPageDisplay').textContent = currentPageNum;
    document.getElementById('totalPages').textContent = totalPages;
    document.getElementById('pageInput').value = currentPageNum;
    document.getElementById('prevBtn').disabled = currentPageNum <= 1;
    document.getElementById('nextBtn').disabled = currentPageNum >= totalPages;

    const content = document.getElementById('scriptureContent');

    if (pageData.is_image_page) {
        content.innerHTML = `
            <div class="scripture-container">
                <div class="scripture-text">
                    <div class="image-page">
                        <p>此页为图像页（封面 / 插图）</p>
                        <img src="${pageData.img_url}" alt="经书图像" onerror="this.style.display='none'">
                    </div>
                </div>
            </div>`;
        document.getElementById('ttsBar').style.display = 'none';
        return;
    }

    document.getElementById('ttsBar').style.display = 'flex';

    const sentences = pageData.sentences;
    let html = `<div class="scripture-container"><div class="scripture-text">`;

    if (cached) {
        html += `<span class="cache-badge">✓ 已缓存</span>`;
    }

    if (!sentences || sentences.length === 0) {
        html += escapeHtml(pageData.punctuated_text);
    } else {
        sentences.forEach((s, i) => {
            const esc = escapeHtml(s);
            html += `<span class="sentence" data-index="${i}" data-text="${esc.replace(/"/g,'&quot;')}" onclick="onSentenceClick(this,event)" ondblclick="onSentenceDblClick(this)" title="单击朗读 · 双击解义">${esc}</span>`;
        });
    }

    html += `</div><div class="hint-text">单击句子 · 语音朗读 &nbsp;|&nbsp; 双击句子 · AI 解义</div></div>`;
    content.innerHTML = html;
}

// ============ Sentence Interaction ============
function onSentenceClick(el, event) {
    if (currentSentence && currentSentence !== el) currentSentence.classList.remove('active');
    el.classList.toggle('active');
    if (el.classList.contains('active')) {
        currentSentence = el;
        speakText(el.dataset.text);
    } else {
        currentSentence = null;
        stopSpeech();
    }
}

function onSentenceDblClick(el) {
    el.classList.add('active');
    currentSentence = el;
    getExplanation(el.dataset.text);
}

// ============ TTS ============
function speakText(text) {
    stopSpeech();
    if (!text) return;
    const utt = new SpeechSynthesisUtterance(text);
    const vSel = document.getElementById('voiceSelect');
    if (vSel.value !== '') utt.voice = voices[parseInt(vSel.value)];
    utt.rate = parseFloat(document.getElementById('rateRange').value);
    utt.lang = 'zh-CN';
    utt.onstart = () => {
        document.getElementById('stopBtn').style.display = 'inline-block';
        if (currentSentence) currentSentence.classList.add('playing');
    };
    utt.onend = utt.onerror = () => {
        document.getElementById('stopBtn').style.display = 'none';
        if (currentSentence) currentSentence.classList.remove('playing');
    };
    speechSynth.speak(utt);
}

function stopSpeech() {
    speechSynth.cancel();
    document.getElementById('stopBtn').style.display = 'none';
    document.querySelectorAll('.sentence.playing').forEach(el => el.classList.remove('playing'));
}

// ============ AI Explanation ============
async function getExplanation(text) {
    const area = document.getElementById('explanationArea');
    area.innerHTML = `
        <div class="selected-quote">${escapeHtml(text)}</div>
        <div class="ai-loading">AI 正在解义<span class="dots"></span></div>`;
    try {
        const resp = await fetch('/api/explain', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({text})
        });
        const data = await resp.json();
        if (data.success) {
            area.innerHTML = `
                <div class="selected-quote">${escapeHtml(text)}</div>
                <div class="explanation-body">${formatMd(data.explanation)}</div>`;
        } else {
            area.innerHTML = `<div class="selected-quote">${escapeHtml(text)}</div><div class="error-box">解义失败：${escapeHtml(data.error)}</div>`;
        }
    } catch(e) {
        area.innerHTML = `<div class="selected-quote">${escapeHtml(text)}</div><div class="error-box">网络错误：${escapeHtml(e.message)}</div>`;
    }
}

function formatMd(text) {
    return text
        .replace(/###\s*(.+)/g, '<h3>$1</h3>')
        .replace(/##\s*(.+)/g, '<h3>$1</h3>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/\n/g, '<br>')
        .replace(/^/, '<p>')
        .replace(/$/, '</p>');
}

// ============ Navigation ============
function prevPage() {
    if (currentPageNum > 1) { currentPageNum--; document.getElementById('pageInput').value = currentPageNum; fetchAndDisplayPage(); }
}
function nextPage() {
    if (currentPageNum < totalPages) { currentPageNum++; document.getElementById('pageInput').value = currentPageNum; fetchAndDisplayPage(); }
}
function jumpToPage() {
    const val = parseInt(document.getElementById('pageInput').value);
    if (val >= 1 && val <= totalPages) { currentPageNum = val; fetchAndDisplayPage(); }
}

// ============ UI Helpers ============
function showLoading(text, sub) {
    document.getElementById('loadingText').textContent = text || '载入中';
    document.getElementById('loadingSub').textContent = sub || '';
    document.getElementById('loadingOverlay').classList.add('active');
}
function hideLoading() {
    document.getElementById('loadingOverlay').classList.remove('active');
}
function showError(msg) {
    document.getElementById('scriptureContent').innerHTML =
        `<div class="error-box">❌ ${escapeHtml(msg)}</div>`;
}
function escapeHtml(text) {
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(text));
    return d.innerHTML;
}
</script>
</body>
</html>
